name: Sync GitHub → Hugging Face Hub
on:
  push:
    branches: [main]
  schedule:
    - cron: "0 2 * * *"   # 🔥 questo aggiorna il tuo repo Hugging Face ogni giorno alle 02:00
  workflow_dispatch:
jobs:
  sync:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: huggingface/hub-sync@v0.1.0
        with:
          github_repo_id: ${{ github.repository }}
          huggingface_repo_id: g229/Pst
          hf_token: ${{ secrets.HF_TOKEN }}
