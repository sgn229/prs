name: Sync Fork Daily

on:
  schedule:
    - cron: '0 2 * * *' # ogni giorno alle 02:00 UTC
  workflow_dispatch:

jobs:
  sync:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout fork
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup git
        run: |
          git config user.name "github-actions"
          git config user.email "github-actions@github.com"

      - name: Add upstream
        run: |
          git remote add upstream https://github.com/realbestia1/EasyProxy.git
          git fetch upstream

      - name: Rebase with upstream
        run: |
          git checkout main
          git rebase upstream/main || echo "REBASE_FAILED=true" >> $GITHUB_ENV

      - name: Push changes
        if: env.REBASE_FAILED != 'true'
        run: |
          git push origin main --force-with-lease
